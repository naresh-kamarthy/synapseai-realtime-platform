<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" fill="none">
  <defs>
    <linearGradient id="icon-grad" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="icon-bg" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <!-- Subtle background shape -->
  <rect width="36" height="36" rx="10" fill="url(#icon-bg)"/>
  <rect width="36" height="36" rx="10" stroke="url(#icon-grad)" stroke-width="0.75" opacity="0.3"/>
  <!-- Neural synapse triangle paths -->
  <path d="M10 26 L18 8 L26 26" stroke="url(#icon-grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M10 26 L26 26" stroke="url(#icon-grad)" stroke-width="1.4" stroke-linecap="round" opacity="0.5"/>
  <!-- Signal flow curves -->
  <path d="M13 17 Q18 21 23 17" stroke="#22d3ee" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M11.5 22 Q18 26 24.5 22" stroke="#818cf8" stroke-width="0.9" stroke-linecap="round" fill="none" opacity="0.4"/>
  <!-- Neural nodes -->
  <circle cx="18" cy="8" r="3" fill="url(#icon-grad)"/>
  <circle cx="10" cy="26" r="2.5" fill="#818cf8"/>
  <circle cx="26" cy="26" r="2.5" fill="#22d3ee"/>
  <!-- Inner pulse dots -->
  <circle cx="18" cy="8" r="1.2" fill="white" opacity="0.9"/>
  <circle cx="10" cy="26" r="1" fill="white" opacity="0.7"/>
  <circle cx="26" cy="26" r="1" fill="white" opacity="0.7"/>
</svg>
