<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="loader-grad" x1="0" y1="0" x2="80" y2="80">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes pulse-node { 0%, 100% { opacity: 1; r: 4; } 50% { opacity: 0.5; r: 5.5; } }
    @keyframes spin-ring { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes dash { 0% { stroke-dashoffset: 200; } 100% { stroke-dashoffset: 0; } }
    .node-pulse { animation: pulse-node 1.8s ease-in-out infinite; }
    .node-pulse-delay { animation: pulse-node 1.8s ease-in-out 0.6s infinite; }
    .node-pulse-delay2 { animation: pulse-node 1.8s ease-in-out 1.2s infinite; }
    .spin-ring { animation: spin-ring 3s linear infinite; transform-origin: 40px 40px; }
    .dash-flow { animation: dash 2s linear infinite; stroke-dasharray: 40 160; }
  </style>
  <!-- Outer rotating ring -->
  <circle cx="40" cy="40" r="36" stroke="url(#loader-grad)" stroke-width="1" opacity="0.2" class="spin-ring"/>
  <circle cx="40" cy="40" r="36" stroke="url(#loader-grad)" stroke-width="1.5" class="spin-ring dash-flow"/>
  <!-- Synapse triangle paths -->
  <path d="M28 52 L40 20 L52 52" stroke="url(#loader-grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M28 52 L52 52" stroke="url(#loader-grad)" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  <!-- Signal curve -->
  <path d="M33 36 Q40 42 47 36" stroke="#22d3ee" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.5"/>
  <!-- Pulsing neural nodes -->
  <circle cx="40" cy="20" r="4" fill="#818cf8" class="node-pulse"/>
  <circle cx="28" cy="52" r="3.5" fill="#6366f1" class="node-pulse-delay"/>
  <circle cx="52" cy="52" r="3.5" fill="#22d3ee" class="node-pulse-delay2"/>
  <!-- Inner white dots -->
  <circle cx="40" cy="20" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="28" cy="52" r="1.2" fill="white" opacity="0.7"/>
  <circle cx="52" cy="52" r="1.2" fill="white" opacity="0.7"/>
</svg>
